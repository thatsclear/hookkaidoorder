<head>
<meta charset="UTF-8" />

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0ece4; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

/* Topbar */
.topbar { background: #0a0a0a; padding: 14px 16px 12px; border-bottom: 0.5px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.logo { font-size: 17px; font-weight: 600; letter-spacing: 0.08em; color: #f0ece4; }
.logo span { color: #d4543e; }
.lang-switch { display: flex; gap: 4px; }
.lang-btn { background: none; border: 0.5px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); font-size: 11px; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.lang-btn.active { border-color: rgba(255,255,255,0.5); color: #f0ece4; }

/* Table bar */
.table-bar { margin: 10px 16px; padding: 9px 14px; background: rgba(255,255,255,0.04); border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 8px; }
.table-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4543e; flex-shrink: 0; }
.table-label { font-size: 12px; color: rgba(255,255,255,0.4); }
.table-name { font-size: 13px; font-weight: 500; color: #f0ece4; margin-left: auto; }

/* Search */
.search-wrap { position: relative; padding: 0 16px 12px; }
.search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-60%); color: rgba(255,255,255,0.3); width: 16px; height: 16px; }
.search-input { width: 100%; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px 10px 38px; color: #f0ece4; font-size: 14px; font-family: inherit; outline: none; }
.search-input::placeholder { color: rgba(255,255,255,0.3); }
.search-input:focus { border-color: rgba(255,255,255,0.25); }

/* Categories */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 16px 8px; }
.cat-btn { padding: 10px 12px; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer; text-align: left; font-family: inherit; }
.cat-btn.active { background: #d4543e; border-color: #d4543e; color: #fff; }

/* Menu */
.section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: rgba(255,255,255,0.25); text-transform: uppercase; padding: 14px 16px 8px; }
.items-list { padding: 0 16px; }
.item-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid rgba(255,255,255,0.06); cursor: pointer; }
.item-row:last-child { border-bottom: none; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; color: #f0ece4; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-name mark { background: rgba(212,84,62,0.4); color: #f0ece4; border-radius: 3px; padding: 0 2px; }
.item-desc { font-size: 11px; color: rgba(255,255,255,0.32); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-price { font-size: 13px; color: rgba(255,255,255,0.5); flex-shrink: 0; white-space: nowrap; }
.item-add { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid rgba(255,255,255,0.2); background: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: inherit; line-height: 1; }
.item-add.in-cart { background: #d4543e; border-color: #d4543e; color: #fff; font-size: 12px; font-weight: 600; }
.no-results { padding: 40px 16px; text-align: center; color: rgba(255,255,255,0.25); font-size: 14px; }

/* Cart bar */
.cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 448px; background: #d4543e; border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; z-index: 100; transition: opacity 0.2s, transform 0.2s; }
.cart-bar.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(8px); }
.cart-bar-left { display: flex; align-items: center; gap: 10px; }
.cart-count { background: rgba(255,255,255,0.25); border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 600; color: #fff; }
.cart-bar-label { font-size: 14px; font-weight: 500; color: #fff; }
.cart-total { font-size: 14px; font-weight: 600; color: #fff; }

/* Overlays */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: #111; border-radius: 20px 20px 0 0; padding: 18px 16px 36px; width: 100%; max-height: 85vh; overflow-y: auto; }
.sheet-handle { width: 32px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 3px; color: #f0ece4; }
.sheet-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 18px; }

/* Cart items */
.cart-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
.cart-item-name { flex: 1; font-size: 13px; color: #f0ece4; line-height: 1.3; }
.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid rgba(255,255,255,0.2); background: none; color: rgba(255,255,255,0.6); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.qty-num { font-size: 14px; font-weight: 500; color: #f0ece4; min-width: 14px; text-align: center; }
.cart-item-price { font-size: 13px; color: rgba(255,255,255,0.45); min-width: 56px; text-align: right; white-space: nowrap; }
.comment-label { font-size: 12px; color: rgba(255,255,255,0.35); margin: 16px 0 6px; }
.comment-input { width: 100%; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 9px 12px; color: #f0ece4; font-size: 13px; resize: none; height: 58px; font-family: inherit; outline: none; }
.total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 16px; }
.total-label { font-size: 13px; color: rgba(255,255,255,0.4); }
.total-amount { font-size: 21px; font-weight: 600; color: #f0ece4; }
.order-btn { width: 100%; background: #d4543e; border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.order-btn:disabled { opacity: 0.5; cursor: default; }
.order-success { text-align: center; padding: 12px 0 4px; }
.order-success-title { font-size: 16px; font-weight: 500; color: #f0ece4; margin-bottom: 4px; }
.order-success-sub { font-size: 13px; color: rgba(255,255,255,0.4); }

/* Detail overlay */
.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; align-items: flex-end; }
.detail-overlay.open { display: flex; }
.detail-sheet { background: #111; border-radius: 20px 20px 0 0; padding: 18px 16px 36px; width: 100%; }
.detail-name { font-size: 19px; font-weight: 600; color: #f0ece4; margin-bottom: 8px; line-height: 1.3; }
.detail-desc { font-size: 14px; color: rgba(255,255,255,0.4); line-height: 1.7; margin-bottom: 24px; }
.detail-row { display: flex; align-items: center; justify-content: space-between; }
.detail-price { font-size: 22px; font-weight: 600; color: #f0ece4; }
.detail-add { background: #d4543e; border: none; border-radius: 12px; padding: 12px 24px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
</style>
</head>

let lang = 'cs';
let activeCat = -1;
let searchQ = '';
let cart = {};
let detailItem = null;

// --- Table from URL ---
const params = new URLSearchParams(window.location.search);
const tableKey = (params.get('stol') || 'obraz').toLowerCase().replace(/[\s-]/g, '');
const currentTable = TABLES[tableKey] ? tableKey : 'obraz';
document.getElementById('tname').textContent = TABLES[currentTable].cs;

function getTableName() { return TABLES[currentTable][lang]; }
function getTableInternal() { return TABLES[currentTable].internal; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const i = I18N[l];
  document.getElementById('lbl-tp').textContent = i.tp;
  document.getElementById('lbl-order').textContent = i.order;
  document.getElementById('lbl-your-order').textContent = i.yourOrder;
  document.getElementById('lbl-comment').textContent = i.comment;
  document.getElementById('lbl-total').textContent = i.total;
  document.getElementById('order-btn').textContent = i.send;
  document.getElementById('lbl-add').textContent = i.add;
  document.getElementById('comment-input').placeholder = i.ph;
  document.getElementById('search').placeholder = i.search;
  document.getElementById('tname').textContent = getTableName();
  document.getElementById('cart-sub').textContent = i.tl + ': ' + getTableName();
  renderCats(); renderMenu(); updateCartBar();
}

function renderCats() {
  document.getElementById('cat-grid').innerHTML = CAT_NAMES[lang].map((n, i) =>
    `<button class="cat-btn${i === activeCat ? ' active' : ''}" onclick="selectCat(${i})">${n}</button>`
  ).join('');
}

function selectCat(i) {
  activeCat = (activeCat === i) ? -1 : i;
  searchQ = '';
  document.getElementById('search').value = '';
  document.getElementById('cat-section').style.display = '';
  renderCats(); renderMenu();
}

function onSearch(q) {
  searchQ = q.trim().toLowerCase();
  if (searchQ) {
    activeCat = -1;
    document.getElementById('cat-section').style.display = 'none';
  } else {
    document.getElementById('cat-section').style.display = '';
  }
  renderMenu();
}

function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
}

function itemRow(item, q) {
  const inCart = cart[item.id] > 0;
  const btn = inCart
    ? `<button class="item-add in-cart" onclick="event.stopPropagation();addItem('${item.id}')">${cart[item.id]}</button>`
    : `<button class="item-add" onclick="event.stopPropagation();addItem('${item.id}')">+</button>`;
  return `<div class="item-row" onclick="openDetail('${item.id}')">
    <div class="item-info">
      <div class="item-name">${q ? highlight(item.name[lang], q) : item.name[lang]}</div>
      <div class="item-desc">${item.desc[lang]}</div>
    </div>
    <span class="item-price">${item.price}&nbsp;Kč</span>
    ${btn}
  </div>`;
}

function renderMenu() {
  const el = document.getElementById('menu-content');
  if (searchQ) {
    const items = MENU.filter(m =>
      m.name[lang].toLowerCase().includes(searchQ) ||
      m.desc[lang].toLowerCase().includes(searchQ)
    );
    el.innerHTML = items.length
      ? `<div class="items-list">${items.map(m => itemRow(m, searchQ)).join('')}</div>`
      : `<div class="no-results">${I18N[lang].noResults}</div>`;
  } else if (activeCat >= 0) {
    const items = MENU.filter(m => m.cat === activeCat);
    el.innerHTML = `<div class="section-title">${CAT_NAMES[lang][activeCat]}</div><div class="items-list">${items.map(m => itemRow(m, '')).join('')}</div>`;
  } else {
    el.innerHTML = '';
  }
}

function addItem(id) {
  cart[id] = (cart[id] || 0) + 1;
  renderMenu(); updateCartBar();
}

function updateCartBar() {
  const count = Object.values(cart).reduce((s, q) => s + q, 0);
  const total = Object.entries(cart).reduce((s, [id, q]) => {
    const m = MENU.find(x => x.id === id); return s + (m ? m.price * q : 0);
  }, 0);
  document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-bar-total').textContent = total + ' Kč';
}

function openCart() {
  renderCartSheet();
  document.getElementById('cart-overlay').classList.add('open');
}

function renderCartSheet() {
  const i = I18N[lang];
  const rows = Object.entries(cart).filter(([, q]) => q > 0).map(([id, q]) => {
    const m = MENU.find(x => x.id === id);
    return `<div class="cart-item">
      <span class="cart-item-name">${m.name[lang]}</span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
        <span class="qty-num">${q}</span>
        <button class="qty-btn" onclick="changeQty('${id}',1)">+</button>
      </div>
      <span class="cart-item-price">${m.price * q}&nbsp;Kč</span>
    </div>`;
  }).join('');
  const total = Object.entries(cart).reduce((s, [id, q]) => {
    const m = MENU.find(x => x.id === id); return s + (m ? m.price * q : 0);
  }, 0);
  document.getElementById('cart-items').innerHTML = rows;
  document.getElementById('cart-total-amount').textContent = total + ' Kč';
  document.getElementById('cart-sub').textContent = i.tl + ': ' + getTableName();
  document.getElementById('order-result').innerHTML = '';
  document.getElementById('order-btn').disabled = false;
  document.getElementById('order-btn').textContent = i.send;
}

function changeQty(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  if (!cart[id]) delete cart[id];
  if (!Object.keys(cart).length) document.getElementById('cart-overlay').classList.remove('open');
  else renderCartSheet();
  updateCartBar(); renderMenu();
}

async function sendOrder() {
  const i = I18N[lang];
  const btn = document.getElementById('order-btn');
  btn.disabled = true; btn.textContent = '...';

  const items = Object.entries(cart).filter(([, q]) => q > 0).map(([id, q]) => {
    const m = MENU.find(x => x.id === id);
    return { name: m.name.cs, qty: q, total: m.price * q };
  });
  const total = items.reduce((s, x) => s + x.total, 0);
  const now = new Date();
  const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  const lines = items.map(x => `${x.qty}× ${x.name} — ${x.total} Kč`).join('\n');
  const comment = document.getElementById('comment-input').value.trim();
  const message = `🆕 Objednávka — ${getTableName()} (${getTableInternal()})\n─────────────────\n${lines}\n─────────────────\nCelkem: ${total} Kč\nČas: ${time}${comment ? '\nKomentář: ' + comment : ''}`;

  try {
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    if (!res.ok) throw new Error('server error');
    document.getElementById('order-result').innerHTML =
      `<div class="order-success"><div class="order-success-title">${i.sent}</div><div class="order-success-sub">${i.sentSub}</div></div>`;
    btn.textContent = i.sent;
    cart = {};
    updateCartBar(); renderMenu();
    document.getElementById('comment-input').value = '';
    setTimeout(() => document.getElementById('cart-overlay').classList.remove('open'), 2500);
  } catch {
    btn.disabled = false;
    btn.textContent = i.send;
    document.getElementById('order-result').innerHTML =
      `<div style="color:rgba(255,100,80,0.8);font-size:13px;margin-bottom:12px;text-align:center">Chyba připojení, zkuste znovu</div>`;
  }
}

function openDetail(id) {
  detailItem = MENU.find(m => m.id === id);
  if (!detailItem) return;
  document.getElementById('d-name').textContent = detailItem.name[lang];
  document.getElementById('d-desc').textContent = detailItem.desc[lang];
  document.getElementById('d-price').textContent = detailItem.price + ' Kč';
  document.getElementById('lbl-add').textContent = I18N[lang].add;
  document.getElementById('detail-overlay').classList.add('open');
}

function addFromDetail() {
  if (!detailItem) return;
  addItem(detailItem.id);
  document.getElementById('detail-overlay').classList.remove('open');
  detailItem = null;
}

document.getElementById('detail-overlay').addEventListener('click', function(e) {
  if (e.target === this) { this.classList.remove('open'); detailItem = null; }
});
document.getElementById('cart-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

renderCats();
renderMenu();
</script>
