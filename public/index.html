<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Hookkaido — Menu</title>
<style>
:root {
  --bg: #faf7f0;
  --surface: #ffffff;
  --line: rgba(0,0,0,0.08);
  --line-2: rgba(0,0,0,0.04);
  --text: #1a1a1a;
  --text-2: rgba(0,0,0,0.55);
  --text-3: rgba(0,0,0,0.4);
  --text-4: rgba(0,0,0,0.28);
  --accent: #d4543e;
  --accent-soft: rgba(212,84,62,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 110px; }

.topbar { background: var(--bg); padding: 14px 16px 12px; border-bottom: 0.5px solid var(--line); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.logo-img { height: 28px; width: auto; }
.lang-switch { display: flex; gap: 4px; }
.lang-btn { background: none; border: 0.5px solid var(--line); color: var(--text-3); font-size: 11px; padding: 4px 9px; border-radius: 6px; cursor: pointer; font-family: inherit; letter-spacing: 0.04em; }
.lang-btn.active { border-color: var(--text); color: var(--text); }

.table-bar { margin: 10px 16px; padding: 9px 14px; background: var(--surface); border-radius: 10px; border: 0.5px solid var(--line); display: flex; align-items: center; gap: 8px; }
.table-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.table-label { font-size: 12px; color: var(--text-3); }
.table-name { font-size: 13px; font-weight: 600; color: var(--text); margin-left: auto; }

.search-wrap { position: relative; padding: 0 16px 12px; }
.search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-60%); color: var(--text-4); width: 16px; height: 16px; }
.search-input { width: 100%; background: var(--surface); border: 0.5px solid var(--line); border-radius: 10px; padding: 10px 14px 10px 38px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
.search-input::placeholder { color: var(--text-4); }
.search-input:focus { border-color: var(--text-3); }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 16px 8px; }
.cat-btn { padding: 11px 12px; border-radius: 10px; border: 0.5px solid var(--line); background: var(--surface); color: var(--text-2); font-size: 13px; cursor: pointer; text-align: left; font-family: inherit; display: flex; align-items: center; gap: 8px; }
.cat-btn .emoji { font-size: 15px; flex-shrink: 0; }
.cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; color: var(--text-4); text-transform: uppercase; padding: 18px 16px 8px; }
.subsection-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-3); text-transform: uppercase; padding: 14px 16px 6px; }

.items-list { padding: 0 16px; }
.item-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--line-2); cursor: pointer; }
.item-row:last-child { border-bottom: none; }
.item-row.disabled { opacity: 0.45; cursor: not-allowed; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-name mark { background: var(--accent-soft); color: var(--text); border-radius: 3px; padding: 0 2px; }
.item-desc { font-size: 11px; color: var(--text-3); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-restriction { font-size: 11px; color: var(--accent); font-weight: 500; margin-top: 2px; }
.item-price { font-size: 13px; color: var(--text-2); flex-shrink: 0; white-space: nowrap; }
.item-price-from { font-size: 11px; color: var(--text-3); margin-right: 2px; }
.item-add { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--line); background: var(--surface); color: var(--text-3); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: inherit; line-height: 1; }
.item-add.in-cart { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 12px; font-weight: 600; }
.item-add.disabled { opacity: 0.3; pointer-events: none; }
.no-results { padding: 40px 16px; text-align: center; color: var(--text-4); font-size: 14px; }
.empty-cat-hint { padding: 20px 16px; font-size: 13px; color: var(--text-3); text-align: center; line-height: 1.5; }

.cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 448px; background: var(--accent); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; z-index: 100; transition: opacity 0.2s, transform 0.2s; box-shadow: 0 6px 20px rgba(212,84,62,0.25); }
.cart-bar.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(8px); }
.cart-bar-left { display: flex; align-items: center; gap: 10px; }
.cart-count { background: rgba(255,255,255,0.25); border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 600; color: #fff; }
.cart-bar-label { font-size: 14px; font-weight: 500; color: #fff; }
.cart-total { font-size: 14px; font-weight: 600; color: #fff; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 18px 16px 36px; width: 100%; max-height: 85vh; overflow-y: auto; }
.sheet-handle { width: 32px; height: 3px; background: var(--text-4); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 3px; color: var(--text); }
.sheet-sub { font-size: 12px; color: var(--text-3); margin-bottom: 18px; }

.cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--line-2); }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 13px; color: var(--text); line-height: 1.3; }
.cart-item-variant { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid var(--line); background: var(--surface); color: var(--text-2); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.qty-num { font-size: 14px; font-weight: 500; color: var(--text); min-width: 14px; text-align: center; }
.cart-item-price { font-size: 13px; color: var(--text-3); min-width: 60px; text-align: right; white-space: nowrap; }
.comment-label { font-size: 12px; color: var(--text-3); margin: 16px 0 6px; }
.comment-input { width: 100%; background: var(--surface); border: 0.5px solid var(--line); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 13px; resize: none; height: 58px; font-family: inherit; outline: none; }
.total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 16px; }
.total-label { font-size: 13px; color: var(--text-3); }
.total-amount { font-size: 21px; font-weight: 600; color: var(--text); }
.order-btn { width: 100%; background: var(--accent); border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.order-btn:disabled { opacity: 0.5; cursor: default; }
.order-success { text-align: center; padding: 12px 0 4px; }
.order-success-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.order-success-sub { font-size: 13px; color: var(--text-3); }

.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; align-items: flex-end; }
.detail-overlay.open { display: flex; }
.detail-sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 18px 16px 36px; width: 100%; max-height: 85vh; overflow-y: auto; }
.detail-name { font-size: 19px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
.detail-desc { font-size: 14px; color: var(--text-3); line-height: 1.6; margin-bottom: 18px; }
.detail-restriction { background: var(--accent-soft); color: var(--accent); border-radius: 8px; padding: 8px 12px; font-size: 12px; margin-bottom: 16px; line-height: 1.4; }
.opt-group { margin-bottom: 16px; }
.opt-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-3); text-transform: uppercase; margin-bottom: 8px; }
.opt-list { display: flex; flex-direction: column; gap: 6px; }
.opt-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 11px 14px; background: var(--surface); border: 0.5px solid var(--line); border-radius: 10px; cursor: pointer; }
.opt-row.selected { border-color: var(--accent); background: var(--accent-soft); }
.opt-row-left { flex: 1; min-width: 0; }
.opt-name { font-size: 14px; color: var(--text); }
.opt-detail { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.opt-price { font-size: 13px; color: var(--text-2); white-space: nowrap; }
.detail-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.detail-price { font-size: 22px; font-weight: 600; color: var(--text); }
.detail-add { background: var(--accent); border: none; border-radius: 12px; padding: 12px 22px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.detail-add:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <img src="/img/logo.png" alt="Hookkaido" class="logo-img" />
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('cs')">CZ</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ru')">RU</button>
    </div>
  </div>

  <div class="table-bar">
    <div class="table-dot"></div>
    <span class="table-label" id="lbl-tp">Stůl</span>
    <span class="table-name" id="tname">—</span>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" placeholder="Hledat..." oninput="onSearch(this.value)" autocomplete="off" />
  </div>

  <div id="cat-section">
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div id="menu-content"></div>

  <div class="cart-bar hidden" id="cart-bar" onclick="openCart()">
    <div class="cart-bar-left">
      <span class="cart-count" id="cart-count">0</span>
      <span class="cart-bar-label" id="lbl-order">Zobrazit objednávku</span>
    </div>
    <span class="cart-total" id="cart-bar-total">0 Kč</span>
  </div>
</div>

<div class="overlay" id="cart-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="lbl-your-order">Vaše objednávka</div>
    <div class="sheet-sub" id="cart-sub"></div>
    <div id="cart-items"></div>
    <div class="comment-label" id="lbl-comment">Komentář</div>
    <textarea class="comment-input" id="comment-input" placeholder="méně ledu, alergeny..."></textarea>
    <div class="total-row">
      <span class="total-label" id="lbl-total">Celkem</span>
      <span class="total-amount" id="cart-total-amount">0 Kč</span>
    </div>
    <div id="order-result"></div>
    <button class="order-btn" id="order-btn" onclick="sendOrder()">Odeslat objednávku</button>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-desc" id="d-desc"></div>
    <div id="d-restriction"></div>
    <div id="d-options"></div>
    <div class="detail-row">
      <span class="detail-price" id="d-price"></span>
      <button class="detail-add" id="d-add" onclick="addFromDetail()">Přidat</button>
    </div>
  </div>
</div>

}
const SUBCAT_ORDER_BY_CAT = {
  2:  ['gin','vodka','rum','tequila','whisky'],
  3:  ['tea','taiwan'],
  11: ['vodka','gin','whisky','tequila','cognac','rum','other'],
};

let lang = 'cs';
let activeCat = -1;
let searchQ = '';
let cart = [];
let detailItem = null;
let detailFlavour = null;
let detailSize = null;
let detailQty = null;        // for fixed qtyOptions (legacy)
let detailFreeQty = 1;       // for qtyPricing (free-form counter)

const params = new URLSearchParams(window.location.search);
const tableKey = (params.get('stol') || 'obraz').toLowerCase().replace(/[\s-]/g, '');
const currentTable = TABLES[tableKey] ? tableKey : 'obraz';

function getTableName() { return TABLES[currentTable][lang]; }
function getTableInternal() { return TABLES[currentTable].internal; }

function isWorkAndSmokeNow() {
  const fmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Europe/Prague', hour12: false,
    weekday: 'short', hour: '2-digit', minute: '2-digit',
  });
  const obj = {};
  fmt.formatToParts(new Date()).forEach(p => obj[p.type] = p.value);
  const isWeekday = ['Mon','Tue','Wed','Thu','Fri'].includes(obj.weekday);
  const totalMin = parseInt(obj.hour, 10) * 60 + parseInt(obj.minute, 10);
  return isWeekday && totalMin >= 13 * 60 && totalMin < 16 * 60;
}
function isItemAvailable(item) {
  if (item.restriction === 'workandsmoke') return isWorkAndSmokeNow();
  return true;
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const i = I18N[l];
  document.getElementById('lbl-tp').textContent = i.tp;
  document.getElementById('lbl-order').textContent = i.order;
  document.getElementById('lbl-your-order').textContent = i.yourOrder;
  document.getElementById('lbl-comment').textContent = i.comment;
  document.getElementById('lbl-total').textContent = i.total;
  document.getElementById('order-btn').textContent = i.send;
  document.getElementById('comment-input').placeholder = i.ph;
  document.getElementById('search').placeholder = i.search;
  document.getElementById('tname').textContent = getTableName();
  document.getElementById('cart-sub').textContent = i.tl + ': ' + getTableName();
  renderCats(); renderMenu(); updateCartBar();
}

function renderCats() {
  document.getElementById('cat-grid').innerHTML = CATS.map((c, i) =>
    `<button class="cat-btn${i === activeCat ? ' active' : ''}" onclick="selectCat(${i})">
      <span class="emoji">${c.emoji}</span>
      <span>${c.name[lang]}</span>
    </button>`
  ).join('');
}

function selectCat(i) {
  activeCat = (activeCat === i) ? -1 : i;
  searchQ = '';
  document.getElementById('search').value = '';
  document.getElementById('cat-section').style.display = '';
  renderCats(); renderMenu();
}

function onSearch(q) {
  searchQ = q.trim().toLowerCase();
  if (searchQ) { activeCat = -1; document.getElementById('cat-section').style.display = 'none'; }
  else { document.getElementById('cat-section').style.display = ''; }
  renderMenu();
}

function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
}

function itemMinPrice(item) {
  if (item.price !== undefined) return item.price;
  if (item.sizes) return Math.min(...item.sizes.map(s => s.price));
  if (item.qtyOptions) return item.qtyOptions[0].price;
  if (item.qtyPricing) return item.qtyPricing.single; // 1 ks
  return 0;
}
// Pair-discount price: pairs cost p.pair, leftover cost p.single
function calcPairPrice(qty, p) {
  const pairs = Math.floor(qty / 2);
  const leftover = qty % 2;
  return pairs * p.pair + leftover * p.single;
}
function itemHasOptions(item) { return !!(item.flavours || item.sizes || item.qtyOptions || item.qtyPricing); }
function cartQuantityForItem(item) { return cart.filter(c => c.itemId === item.id).reduce((s, c) => s + c.qty, 0); }

function itemRow(item, q) {
  const available = isItemAvailable(item);
  const cartQty = cartQuantityForItem(item);
  const inCart = cartQty > 0;
  const minPrice = itemMinPrice(item);
  const hasRange = item.sizes || item.qtyOptions || item.qtyPricing;
  const priceLabel = hasRange
    ? `<span class="item-price-from">${I18N[lang].from}</span>${minPrice}&nbsp;Kč`
    : `${minPrice}&nbsp;Kč`;

  let btn;
  if (!available) {
    btn = `<button class="item-add disabled">+</button>`;
  } else {
    btn = inCart
      ? `<button class="item-add in-cart" onclick="event.stopPropagation();handleAdd('${item.id}')">${cartQty}</button>`
      : `<button class="item-add" onclick="event.stopPropagation();handleAdd('${item.id}')">+</button>`;
  }

  const restrictionLine = (!available && item.restriction === 'workandsmoke')
    ? `<div class="item-restriction">${I18N[lang].restrictionWS}</div>` : '';

  return `<div class="item-row ${available ? '' : 'disabled'}" onclick="${available ? `openDetail('${item.id}')` : ''}">
    <div class="item-info">
      <div class="item-name">${q ? highlight(item.name[lang], q) : item.name[lang]}</div>
      <div class="item-desc">${item.desc[lang]}</div>
      ${restrictionLine}
    </div>
    <span class="item-price">${priceLabel}</span>
    ${btn}
  </div>`;
}

function handleAdd(itemId) {
  const item = MENU.find(m => m.id === itemId);
  if (!item || !isItemAvailable(item)) return;
  if (itemHasOptions(item)) openDetail(itemId);
  else addToCart(item, null, item.price, 1);
}

function renderMenu() {
  const el = document.getElementById('menu-content');
  if (searchQ) {
    const items = MENU.filter(m =>
      m.name[lang].toLowerCase().includes(searchQ) ||
      m.desc[lang].toLowerCase().includes(searchQ)
    );
    el.innerHTML = items.length
      ? `<div class="items-list">${items.map(m => itemRow(m, searchQ)).join('')}</div>`
      : `<div class="no-results">${I18N[lang].noResults}</div>`;
    return;
  }
  if (activeCat < 0) { el.innerHTML = ''; return; }

  const cat = CATS[activeCat];
  const items = MENU.filter(m => m.cat === activeCat);
  let html = `<div class="section-title">${cat.emoji} ${cat.name[lang]}</div>`;
  if (!items.length) {
    html += `<div class="empty-cat-hint">${I18N[lang].emptyCat}</div>`;
    el.innerHTML = html; return;
  }
  const subOrder = SUBCAT_ORDER_BY_CAT[activeCat];
  if (subOrder) {
    subOrder.forEach(sc => {
      const sub = items.filter(m => m.subcat === sc);
      if (!sub.length) return;
      const sn = subcatName(activeCat, sc);
      html += `<div class="subsection-title">${sn ? sn[lang] : sc}</div>`;
      html += `<div class="items-list">${sub.map(m => itemRow(m, '')).join('')}</div>`;
    });
    const noSub = items.filter(m => !m.subcat);
    if (noSub.length) html += `<div class="items-list">${noSub.map(m => itemRow(m, '')).join('')}</div>`;
  } else {
    html += `<div class="items-list">${items.map(m => itemRow(m, '')).join('')}</div>`;
  }
  el.innerHTML = html;
}

function makeCartKey(itemId, variant) {
  return itemId + (variant ? '|' + JSON.stringify(variant) : '');
}
function addToCart(item, variant, price, qty) {
  const key = makeCartKey(item.id, variant);
  const existing = cart.find(c => c.key === key);
  if (existing) existing.qty += qty;
  else cart.push({ key, itemId: item.id, name: item.name, variant, price, qty });
  renderMenu(); updateCartBar();
}
function changeCartQty(key, delta) {
  const c = cart.find(x => x.key === key);
  if (!c) return;
  c.qty += delta;
  if (c.qty <= 0) cart = cart.filter(x => x.key !== key);
  if (!cart.length) document.getElementById('cart-overlay').classList.remove('open');
  else renderCartSheet();
  updateCartBar(); renderMenu();
}
function updateCartBar() {
  const count = cart.reduce((s, c) => s + c.qty, 0);
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-bar-total').textContent = total + ' Kč';
}

function openCart() { renderCartSheet(); document.getElementById('cart-overlay').classList.add('open'); }
function variantText(variant) {
  if (!variant) return '';
  const parts = [];
  if (variant.flavour) parts.push(variant.flavour[lang]);
  if (variant.size) parts.push(variant.size[lang]);
  if (variant.qty) parts.push(variant.qty + '×');
  if (variant.count) parts.push(variant.count + ' ks');
  return parts.join(' · ');
}
function renderCartSheet() {
  const i = I18N[lang];
  const rows = cart.map(c => {
    const v = c.variant ? `<div class="cart-item-variant">${variantText(c.variant)}</div>` : '';
    return `<div class="cart-item">
      <div class="cart-item-info"><div class="cart-item-name">${c.name[lang]}</div>${v}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeCartQty('${c.key}',-1)">−</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn" onclick="changeCartQty('${c.key}',1)">+</button>
      </div>
      <span class="cart-item-price">${c.price * c.qty}&nbsp;Kč</span>
    </div>`;
  }).join('');
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cart-items').innerHTML = rows;
  document.getElementById('cart-total-amount').textContent = total + ' Kč';
  document.getElementById('cart-sub').textContent = i.tl + ': ' + getTableName();
  document.getElementById('order-result').innerHTML = '';
  document.getElementById('order-btn').disabled = false;
  document.getElementById('order-btn').textContent = i.send;
}

function openDetail(id) {
  detailItem = MENU.find(m => m.id === id);
  if (!detailItem) return;
  detailFlavour = null;
  detailSize = (detailItem.sizes && detailItem.sizes.length) ? detailItem.sizes[0] : null;
  detailQty = (detailItem.qtyOptions && detailItem.qtyOptions.length) ? detailItem.qtyOptions[0] : null;
  detailFreeQty = 1;
  renderDetail();
  document.getElementById('detail-overlay').classList.add('open');
}
function selectFlavour(id) { detailFlavour = detailItem.flavours.find(f => f.id === id); renderDetail(); }
function selectSize(idx) { detailSize = detailItem.sizes[idx]; renderDetail(); }
function selectQty(idx) { detailQty = detailItem.qtyOptions[idx]; renderDetail(); }
function changeFreeQty(delta) {
  detailFreeQty = Math.max(1, Math.min(99, detailFreeQty + delta));
  renderDetail();
}
function detailCurrentPrice() {
  if (!detailItem) return 0;
  if (detailItem.qtyPricing) return calcPairPrice(detailFreeQty, detailItem.qtyPricing);
  if (detailQty) return detailQty.price;
  if (detailSize) return detailSize.price;
  return detailItem.price || 0;
}
function detailCanAdd() {
  if (!detailItem || !isItemAvailable(detailItem)) return false;
  if (detailItem.flavours && !detailFlavour) return false;
  if (detailItem.sizes && !detailSize) return false;
  if (detailItem.qtyOptions && !detailQty) return false;
  return true;
}
function renderDetail() {
  const i = I18N[lang]; const it = detailItem;
  document.getElementById('d-name').textContent = it.name[lang];
  document.getElementById('d-desc').textContent = it.desc[lang];
  document.getElementById('d-restriction').innerHTML =
    (!isItemAvailable(it) && it.restriction === 'workandsmoke')
      ? `<div class="detail-restriction">${i.restrictionWS}</div>` : '';

  let opts = '';
  if (it.flavours) {
    opts += `<div class="opt-group"><div class="opt-label">${i.selectFlavor}</div><div class="opt-list">`;
    it.flavours.forEach(f => {
      const sel = detailFlavour && detailFlavour.id === f.id;
      const detail = f.detail ? `<div class="opt-detail">${f.detail[lang]}</div>` : '';
      opts += `<div class="opt-row${sel ? ' selected' : ''}" onclick="selectFlavour('${f.id}')">
        <div class="opt-row-left"><div class="opt-name">${f.name[lang]}</div>${detail}</div>
      </div>`;
    });
    opts += `</div></div>`;
  }
  if (it.sizes) {
    opts += `<div class="opt-group"><div class="opt-label">${i.selectSize}</div><div class="opt-list">`;
    it.sizes.forEach((s, idx) => {
      const sel = detailSize === s;
      opts += `<div class="opt-row${sel ? ' selected' : ''}" onclick="selectSize(${idx})">
        <div class="opt-row-left"><div class="opt-name">${s.label[lang]}</div></div>
        <div class="opt-price">${s.price}&nbsp;Kč</div>
      </div>`;
    });
    opts += `</div></div>`;
  }
  if (it.qtyOptions) {
    opts += `<div class="opt-group"><div class="opt-label">${i.selectQty}</div><div class="opt-list">`;
    it.qtyOptions.forEach((q, idx) => {
      const sel = detailQty === q;
      const per = (q.price / q.qty).toFixed(0);
      const detail = q.qty > 1 ? `<div class="opt-detail">${per} Kč / ks</div>` : '';
      opts += `<div class="opt-row${sel ? ' selected' : ''}" onclick="selectQty(${idx})">
        <div class="opt-row-left"><div class="opt-name">${q.qty}×</div>${detail}</div>
        <div class="opt-price">${q.price}&nbsp;Kč</div>
      </div>`;
    });
    opts += `</div></div>`;
  }
  if (it.qtyPricing) {
    const fullPrice = detailFreeQty * it.qtyPricing.single;
    const realPrice = calcPairPrice(detailFreeQty, it.qtyPricing);
    const savings = fullPrice - realPrice;
    const savingsLine = savings > 0
      ? `<div class="opt-detail" style="color:var(--accent);font-weight:500;margin-top:6px">${ {cs:'Sleva',en:'Discount',ru:'Скидка'}[lang] }: −${savings} Kč</div>`
      : '';
    opts += `<div class="opt-group">
      <div class="opt-label">${i.selectQty}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:18px;background:var(--surface);border:0.5px solid var(--line);border-radius:10px;padding:14px">
        <button class="qty-btn" onclick="changeFreeQty(-1)" ${detailFreeQty <= 1 ? 'disabled style="opacity:0.4"' : ''}>−</button>
        <span style="font-size:22px;font-weight:600;min-width:30px;text-align:center">${detailFreeQty}</span>
        <button class="qty-btn" onclick="changeFreeQty(1)">+</button>
      </div>
      ${savingsLine}
    </div>`;
  }
  document.getElementById('d-options').innerHTML = opts;
  document.getElementById('d-price').textContent = detailCurrentPrice() + ' Kč';
  const addBtn = document.getElementById('d-add');
  addBtn.textContent = i.add;
  addBtn.disabled = !detailCanAdd();
}
function addFromDetail() {
  if (!detailItem || !detailCanAdd()) return;
  const variant = {};
  if (detailFlavour) variant.flavour = detailFlavour.name;
  if (detailSize) variant.size = detailSize.label;
  if (detailQty) variant.qty = detailQty.qty;
  const v = Object.keys(variant).length ? variant : null;

  if (detailItem.qtyPricing) {
    // Pair-discount: add as 1 line with the pre-discounted total as "price" and qty=1
    // so the cart math stays consistent. Show "X ks" in variant text.
    const totalPrice = calcPairPrice(detailFreeQty, detailItem.qtyPricing);
    const variantWithCount = { ...(v || {}), count: detailFreeQty };
    addToCart(detailItem, variantWithCount, totalPrice, 1);
  } else {
    addToCart(detailItem, v, detailCurrentPrice(), 1);
  }
  document.getElementById('detail-overlay').classList.remove('open');
  detailItem = null;
}

async function sendOrder() {
  const i = I18N[lang];
  const btn = document.getElementById('order-btn');
  btn.disabled = true; btn.textContent = '...';
  const lines = cart.map(c => {
    const v = c.variant ? ' (' + variantText(c.variant) + ')' : '';
    return `${c.qty}× ${c.name.cs}${v} — ${c.price * c.qty} Kč`;
  }).join('\n');
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const now = new Date();
  const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  const comment = document.getElementById('comment-input').value.trim();
  const message = `🆕 Objednávka — ${getTableName()} (${getTableInternal()})\n─────────────────\n${lines}\n─────────────────\nCelkem: ${total} Kč\nČas: ${time}${comment ? '\nKomentář: ' + comment : ''}`;
  try {
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    if (!res.ok) throw new Error('server error');
    document.getElementById('order-result').innerHTML =
      `<div class="order-success"><div class="order-success-title">${i.sent}</div><div class="order-success-sub">${i.sentSub}</div></div>`;
    btn.textContent = i.sent;
    cart = []; updateCartBar(); renderMenu();
    document.getElementById('comment-input').value = '';
    setTimeout(() => document.getElementById('cart-overlay').classList.remove('open'), 2500);
  } catch {
    btn.disabled = false; btn.textContent = i.send;
    document.getElementById('order-result').innerHTML =
      `<div style="color:var(--accent);font-size:13px;margin-bottom:12px;text-align:center">Chyba připojení, zkuste znovu</div>`;
  }
}

document.getElementById('detail-overlay').addEventListener('click', function(e) {
  if (e.target === this) { this.classList.remove('open'); detailItem = null; }
});
document.getElementById('cart-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

document.getElementById('tname').textContent = TABLES[currentTable].cs;
renderCats();
renderMenu();
</script>
</body>
</html>
